<!DOCTYPE html>
<html>
<head>
    <title>Farmer Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-success">

<div class="container mt-5">
    <div class="card shadow-lg p-4">
        <h3 class="text-center text-success">🌿 Plant Disease Prediction</h3>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-danger">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" class="form-control mb-3" placeholder="Enter Username" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Enter Password" required>
            <button class="btn btn-success w-100">Sign In</button>
        </form>

        <div class="text-center mt-3">
            <p>New User? <a href="/register">Create Account</a></p>
        </div>

    </div>
</div>

</body>
</html>
