<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-success">

<div class="container mt-5">
    <div class="card shadow-lg p-4">
        <h3 class="text-center text-success">🌿 Create Account</h3>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-danger">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" class="form-control mb-3" placeholder="Enter Username" required>

            <input type="password" name="password" class="form-control mb-3" placeholder="Enter Password" required>

            <!-- ADD THIS CONFIRM FIELD -->
            <input type="password" name="confirm" class="form-control mb-3" placeholder="Confirm Password" required>

            <button class="btn btn-success w-100">Register</button>
        </form>

        <div class="text-center mt-3">
            <p>Already have an account? <a href="/">Sign In</a></p>
        </div>

    </div>
</div>

</body>
</html>
